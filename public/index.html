<style>

<script>
let DATA = null;
let OVERRIDES = { breedOverrides: {}, litterTags: {}, kittenBirthDates: {}, kittenExtraChips: {}, customKittens: {}, kittenMatingInfo: {}, companyStamp: null, personalStamp: null, footerText: '?пҝҪпҝҪ??пҝҪзӮә?пҝҪпҝҪ??пҝҪеҮәеҰӮпҝҪ??пҝҪеёёи«ӢйҖҡзҹҘ', footerTextSize: 14, companyStampSize: 90, personalStampSize: 70, companyStampPos: 'top-right', personalStampPos: 'top-left' };
let currentMode = 'mothers';
let selectedChip = null;
let selectedCats = new Set();
let selectedBreeds = []; // еӨҡйҒё?пҝҪзЁ®
let recentOnly = false;  // иҝ‘пҝҪ?е№ҙзҜ©??
const THREE_YEARS_MS = 3 * 365 * 24 * 3600 * 1000;

// ?пҝҪ?пҝҪ е·Ҙе…·?пҝҪпҝҪ? ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ
function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function modeLabel() { return currentMode === 'mothers' ? 'жҜҚпҝҪ?' : '?пҝҪпҝҪ?'; }
function partnerLabel() { return currentMode === 'mothers' ? '?пҝҪпҝҪ?' : 'жҜҚпҝҪ?'; }
function rowsForMode() { return currentMode === 'mothers' ? DATA.mothers : DATA.fathers; }

// зҚІеҸ–е“ҒзЁ®
function getBreed(parent) {
  return parent.breed || OVERRIDES.breedOverrides[parent.chipId] || '';
}

// ?пҝҪ?пҝҪ иҰҶеҜ«?пҝҪпҝҪ? ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ
async function saveOverrides() {
  await fetch('/feeding/api/overrides', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(OVERRIDES)
  });
}

// ?пҝҪ?пҝҪ еӨҡйҒё?пҝҪзЁ® Dropdown ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ
function collectBreeds() {
  const set = new Set();
  [...DATA.mothers, ...DATA.fathers].forEach(p => {
    const b = getBreed(p);
    if (b) set.add(b.trim());
    p.pdfLitters.forEach(l => l.kittens.forEach(k => { if (k.breed) set.add(k.breed.trim()); }));
    p.otherChildren.forEach(k => { if (k.breed) set.add(k.breed.trim()); });
  });
  return [...set].filter(Boolean).sort((a,b) => a.localeCompare(b, 'zh-Hant'));
}

function renderBreedFilter() {
  const all = collectBreeds();
  const search = document.getElementById('breedSearch').value.toLowerCase();
  const filtered = search ? all.filter(b => b.toLowerCase().includes(search)) : all;
  document.getElementById('breedOptionList').innerHTML = filtered.map(b =>
    `<label class="ms-option"><input type="checkbox" value="${escapeHtml(b)}" ${selectedBreeds.includes(b)?'checked':''} onchange="toggleBreed('${escapeHtml(b)}')" />${escapeHtml(b)}</label>`
  ).join('');
  // ?пҝҪж–° badge
  const box = document.getElementById('breedFilterBox');
  const placeholder = document.getElementById('breedPlaceholder');
  const arrow = box.querySelector('.ms-arrow');
  // з§»йҷӨ??badge
  box.querySelectorAll('.ms-badge').forEach(el => el.remove());
  if (selectedBreeds.length === 0) {
    placeholder.style.display = '';
  } else {
    placeholder.style.display = 'none';
    selectedBreeds.forEach(b => {
      const el = document.createElement('span');
      el.className = 'ms-badge';
      el.innerHTML = `${escapeHtml(b)} <span class="rm" onclick="event.stopPropagation();toggleBreed('${escapeHtml(b)}')">?</span>`;
      box.insertBefore(el, arrow);
    });
  }
}

function toggleBreed(breed) {
  const idx = selectedBreeds.indexOf(breed);
  if (idx >= 0) selectedBreeds.splice(idx, 1);
  else selectedBreeds.push(breed);
  renderBreedFilter();
  renderList();
}

// Dropdown ?пҝҪпҝҪ?
document.addEventListener('click', e => {
  const wrap = document.getElementById('breedFilterWrap');
  const dd = document.getElementById('breedDropdown');

// ?пҝҪ?пҝҪ зҜ©йҒё?пҝҪијҜ ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ
function parentMatchesBreed(parent) {
  if (selectedBreeds.length === 0) return true;
  const pb = getBreed(parent).trim();
  if (selectedBreeds.includes(pb)) return true;
  return parent.pdfLitters.some(l => l.kittens.some(k => selectedBreeds.includes((k.breed||'').trim()))) ||
    parent.otherChildren.some(k => selectedBreeds.includes((k.breed||'').trim()));
}

function getFilteredParents() {
  const keyword = document.getElementById('keyword').value.trim().toLowerCase();
  const sortMode = document.getElementById('sortMode').value;
  const now = Date.now();
  let rows = rowsForMode().filter(p => {
    if (!p.chipId) return false; // йҒҺжҝҫз„Ўжҷ¶зүҮ
    if (!parentMatchesBreed(p)) return false;
    // иҝ‘дёүе№ҙзҜ©йҒё
    if (recentOnly) {
      const allDates = [
        ...p.pdfLitters.map(l => l.productionDate),
        ...p.pdfLitters.flatMap(l => l.kittens.map(k => k.dateValue)),
        ...p.otherChildren.map(k => k.dateValue)
      ].filter(Boolean).map(d => new Date(d).getTime()).filter(t => !isNaN(t));
      if (!allDates.length) return false;
      if (now - Math.max(...allDates) > THREE_YEARS_MS) return false;
    }
    if (!keyword) return true;
    return JSON.stringify(p).toLowerCase().includes(keyword) ||
      (OVERRIDES.breedOverrides[p.chipId]||'').toLowerCase().includes(keyword);
  });
  rows.sort((a,b) => {
    const sa = parentStats(a), sb = parentStats(b);
    if (sortMode === 'pdfDesc') return sb.pdfLitterCount - sa.pdfLitterCount || sb.totalKittenCount - sa.totalKittenCount;
    if (sortMode === 'chipAsc') return a.chipId.localeCompare(b.chipId);
    return sb.totalKittenCount - sa.totalKittenCount || sb.pdfLitterCount - sa.pdfLitterCount;
  });
  return rows;
}

// ?пҝҪ?пҝҪ зөұпҝҪ? ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ
function parentStats(parent) {
  const now = Date.now();
  let pdfLitterCount = 0;
  let pdfKittenCount = 0;
  let otherKittenCount = 0;

  const htmlPdfLitters = parent.pdfLitters.map(l => ({ ...l, kittens: [...l.kittens] }));
  const customKids = OVERRIDES.customKittens[parent.chipId] || [];
  const mergedOther = [...parent.otherChildren, ...customKids];
  const htmlRemainingOther = [];

  mergedOther.forEach(child => {
    const bDate = OVERRIDES.kittenBirthDates[child.chipId] || child.dateValue;
    const matchingPdfLitter = htmlPdfLitters.find(l => l.productionDate && l.productionDate === bDate);
    if (matchingPdfLitter) {
      matchingPdfLitter.kittens.push(child);
    } else {
      htmlRemainingOther.push(child);
    }
  });

  htmlPdfLitters.forEach(l => {
    const dates = [l.productionDate, ...l.kittens.map(k => k.dateValue)].filter(Boolean).map(d => new Date(d).getTime()).filter(t => !isNaN(t));
    if (!recentOnly || (dates.length && now - Math.max(...dates) <= THREE_YEARS_MS)) {
      pdfLitterCount++;
      pdfKittenCount += l.kittens.length;
    }
  });

  htmlRemainingOther.forEach(k => {
    const d = OVERRIDES.kittenBirthDates[k.chipId] || k.dateValue;
    const t = d ? new Date(d).getTime() : 0;
    if (!recentOnly || (t && !isNaN(t) && now - t <= THREE_YEARS_MS)) {
      otherKittenCount++;
    }
  });

  return { 
    pdfLitterCount, 
    pdfKittenCount, 
    otherKittenCount, 
    totalKittenCount: pdfKittenCount + otherKittenCount 
  };
}

function renderStats() {
  let mCount = 0, fCount = 0;
  let pdfMCount = 0, pdfFCount = 0;
  let pdfKittenCount = 0, otherKittenCount = 0;

  const processParent = (p, isMother) => {
    const st = parentStats(p);
    const hasAny = st.pdfLitterCount > 0 || st.otherKittenCount > 0;
    
    if (!recentOnly || hasAny) {
      if (isMother) mCount++; else fCount++;
      if (st.pdfLitterCount > 0) {
        if (isMother) pdfMCount++; else pdfFCount++;
      }
      pdfKittenCount += st.pdfKittenCount;
      otherKittenCount += st.otherKittenCount;
    }
  };

  DATA.mothers.forEach(p => processParent(p, true));
  DATA.fathers.forEach(p => processParent(p, false));

  const s = {
    motherCount: mCount,
    fatherCount: fCount,
    pdfMotherCount: pdfMCount,
    pdfFatherCount: pdfFCount,
    pdfConfirmedKittenCount: pdfKittenCount,
    catFamilyOtherKittenCount: otherKittenCount,
    excludedByFirstRecordRuleCount: DATA.summary.excludedByFirstRecordRuleCount
  };

  const cards = [['жҜҚпҝҪ?зёҪж•ё',s.motherCount],['?пҝҪпҝҪ?зёҪж•ё',s.fatherCount],['PDFжҜҚпҝҪ?',s.pdfMotherCount],['PDF?пҝҪпҝҪ?',s.pdfFatherCount],['PDFзўәпҝҪ?еӯҗд»Ј',s.pdfConfirmedKittenCount],['?пҝҪпҝҪ??пҝҪпҝҪ?еӯҗд»Ј',s.catFamilyOtherKittenCount],['иҪүе…Ҙ?пҝҪйҷӨ',s.excludedByFirstRecordRuleCount]];
  document.getElementById('stats').innerHTML = cards.map(([l,v]) => `<div class="stat"><b>${escapeHtml(v)}</b><span>${escapeHtml(l)}</span></div>`).join('');
}

function groupOtherChildren(children, thresholdDays) {
  const tagged = {}, noTag = [];
  children.forEach(child => {
    const tag = OVERRIDES.litterTags[child.chipId];
    if (tag) {
      if (!tagged[tag]) tagged[tag] = [];
      tagged[tag].push(child);
    } else {
      noTag.push(child);
    }
  });

  const manualGroups = [];
  Object.entries(tagged).forEach(([tag, kids]) => {
    const dates = kids.map(k=>k.dateValue).filter(Boolean).sort();
    manualGroups.push({ isManual:true, tag, startDate:dates[0]||'', endDate:dates[dates.length-1]||'', children:kids });
  });

  const dateMap = {};
  const reallyNoTag = [];
  noTag.forEach(child => {
     if (child.dateValue) {
         if (!dateMap[child.dateValue]) dateMap[child.dateValue] = [];
         dateMap[child.dateValue].push(child);
     } else {
         reallyNoTag.push(child);
     }
  });

  const autoGroups = [];
  Object.entries(dateMap).forEach(([date, kids]) => {
     if (kids.length > 1) {
         autoGroups.push({ isManual: false, isSameDate: true, startDate: date, endDate: date, children: kids });
     } else {
         reallyNoTag.push(kids[0]);
     }
  });

  const sorted = [...reallyNoTag].sort((a,b)=>String(a.dateValue).localeCompare(String(b.dateValue)));
  const thresholdGroups = [];
  for (const child of sorted) {
    const ct = child.dateValue ? new Date(child.dateValue).getTime() : 0;
    const last = thresholdGroups.slice(-1)[0];
    if (!last || !ct) { thresholdGroups.push({ isManual:false, isSameDate:false, startDate:child.dateValue||'', endDate:child.dateValue||'', children:[child] }); continue; }
    const lt = new Date(last.endDate).getTime();
    if (Math.abs(ct-lt)/86400000 <= thresholdDays) { last.children.push(child); last.endDate = child.dateValue||last.endDate; }
    else thresholdGroups.push({ isManual:false, isSameDate:false, startDate:child.dateValue||'', endDate:child.dateValue||'', children:[child] });
  }

  autoGroups.push(...thresholdGroups);
  autoGroups.sort((a,b) => String(a.startDate).localeCompare(String(b.startDate)));

  return [...manualGroups, ...autoGroups];
}

function twYear(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;

}

  parent.pdfLitters.forEach(l => {
    let mCount = 0, fCount = 0, total = l.kittens.length;

      if (k.sex === '??) mCount++;
      else if (k.sex === 'пҝҪ?) fCount++;
      return `${k.chipId}(е·ІеҜө??`;
    }).join('\n');
    let summary = `?пҝҪеҮә?пҝҪе№ј?пҝҪе…¬${mCount}?пҝҪгҖҒпҝҪ?${fCount}?пҝҪпҝҪ??пҝҪпҝҪ?${total}?пҝҪпҝҪ??пҝҪеҜө?пҝҪзҷ»иЁҳжҷ¶?пҝҪпҝҪ?зўјпҝҪ??пҝҪзӮәпјҡ\n${kidsText}`;
    let partnerInfo = l.partnerChipId ? `???пҝҪе ҙ  ??д»–е ҙ\n?пҝҪпҝҪ??пҝҪзўјпҝҪ?{l.partnerChipId}` : '';
    
    allLitters.push({
      timestamp: new Date(l.productionDate).getTime() || Number.MAX_SAFE_INTEGER,
      data: [ "", twYear(l.matingDate), partnerInfo, twYear(l.productionDate), summary ]
    });
  });

  // ?пҝҪпҝҪ??пҝҪпҝҪ??пҝҪпҝҪ??пҝҪж¬Ў
  otherGroups.forEach((g, i) => {
    let mCount = 0, fCount = 0, total = g.children.length;
    let kidsText = g.children.map(k => {
      if (k.sex === '??) mCount++;
      else if (k.sex === 'пҝҪ?) fCount++;
      const extra = OVERRIDES.kittenExtraChips[k.chipId] ? ` (${OVERRIDES.kittenExtraChips[k.chipId]})` : '';
      return `${k.chipId||'?пҝҪжҷ¶??}${extra}`;
    }).join('\n');
    let summary = `?пҝҪеҮә?пҝҪе№ј?пҝҪе…¬${mCount}?пҝҪгҖҒпҝҪ?${fCount}?пҝҪпҝҪ??пҝҪпҝҪ?${total}?пҝҪпҝҪ??пҝҪеҜө?пҝҪзҷ»иЁҳжҷ¶?пҝҪпҝҪ?зўјпҝҪ??пҝҪзӮәпјҡ\n${kidsText}`;
    const groupDate = getGroupDate(g.children) || g.startDate;

    const matingInfo = g.children.map(c => OVERRIDES.kittenMatingInfo[c.chipId]).find(Boolean);
    let matingDateStr = "";
    let partnerInfo = "";
    if (matingInfo) {
      matingDateStr = twYear(matingInfo.matingDate);
      if (matingInfo.partnerChipId) {
        partnerInfo = matingInfo.partnerType === '?пҝҪе ҙ' 
          ? `???пҝҪе ҙ  ??д»–е ҙ\n?пҝҪпҝҪ??пҝҪзўјпҝҪ?{matingInfo.partnerChipId}` 
          : `???пҝҪе ҙ  ??д»–е ҙ\n?пҝҪпҝҪ??пҝҪзўјпҝҪ?{matingInfo.partnerChipId}`;
      }
    }

    allLitters.push({
      timestamp: new Date(groupDate).getTime() || Number.MAX_SAFE_INTEGER,
      data: [ "", matingDateStr, partnerInfo, twYear(groupDate), summary ]
    });
  });

  // дҫқз…§?пҝҪпҝҪ??пҝҪпҝҪ??пҝҪпҝҪ?
  allLitters.sort((a, b) => a.timestamp - b.timestamp);

  // дҫқпҝҪ?еҜ«е…Ҙ ExcelпјҢзөұдёҖз·ЁпҝҪ??пҝҪз¬¬X?пҝҪпҝҪ?  if (allLitters.length === 0) {
    addDataRow("(?пҝҪпҝҪ?ж®–пҝҪ???", "", "", "", "");
  } else {
    allLitters.forEach((item, index) => {
      item.data[0] = `пҝҪ?{index + 1}?пҝҪ`;
      addDataRow(...item.data);
    });
  }

  // ==== ?пҝҪпҝҪ?з°ҪпҝҪ??пҝҪпҝҪ?пҝҪ?====
  currentRow++; // ?пҝҪпҝҪ?иЎҢз©ә??  const footerRowStr = currentRow;
  ws.mergeCells(`A${footerRowStr}:C${footerRowStr}`);
  const footerCell = ws.getCell(`A${footerRowStr}`);
  footerCell.value = OVERRIDES.footerText || '?пҝҪпҝҪ??пҝҪзӮә?пҝҪпҝҪ??пҝҪеҮәеҰӮпҝҪ??пҝҪеёёи«ӢйҖҡзҹҘ';
  footerCell.font = { size: Number(OVERRIDES.footerTextSize) || 14, bold: true };
  footerCell.alignment = { horizontal: 'left', vertical: 'middle' };

  function parseCellOrKeyword(posStr) {
    if (posStr === 'е·ҰпҝҪ?' || posStr === 'top-left') return { row: 0.1, col: 0.1, isBottom: false };
    if (posStr === '?пҝҪпҝҪ?' || posStr === 'top-right') return { row: 0.1, col: 3.5, isBottom: false };
    if (posStr === 'е·ҰпҝҪ?(?пҝҪпҝҪ?еә•йғЁ)' || posStr === 'bottom-left') return { row: footerRowStr - 1 + 0.1, col: 0.1, isBottom: true };
    if (posStr === '?пҝҪпҝҪ?(?пҝҪпҝҪ?еә•йғЁ)' || posStr === 'bottom-right') return { row: footerRowStr - 1 + 0.1, col: 3.5, isBottom: true };
    
    // Parse A1, B2 зӯүиҮӘиЁӮе„Іеӯҳж ј
    const match = String(posStr).toUpperCase().match(/^([A-Z]+)(\d+)$/);
    if (match) {
      const colStr = match[1];
      const rowStr = match[2];
      let colIndex = 0;
      for (let i = 0; i < colStr.length; i++) {
        colIndex = colIndex * 26 + (colStr.charCodeAt(i) - 64);
      }
      return { col: colIndex - 1 + 0.1, row: parseInt(rowStr) - 1 + 0.1, isBottom: false };
    }
    // Default fallback
    return { row: 0.1, col: 3.5, isBottom: false };
  }
  
  // жӘўжҹҘ?пҝҪеҗҰ?пҝҪеҚ°з« еңЁдёӢж–№пјҢиӢҘ?пҝҪпҝҪ??пҝҪпҝҪ?й«ҳеәҰ
  const cPosInfo = parseCellOrKeyword(OVERRIDES.companyStampPos || '?пҝҪпҝҪ?');
  const pPosInfo = parseCellOrKeyword(OVERRIDES.personalStampPos || 'е·ҰпҝҪ?');
  const hasBottomStamp = (OVERRIDES.companyStamp && cPosInfo.isBottom) || 
                         (OVERRIDES.personalStamp && pPosInfo.isBottom);
  ws.getRow(footerRowStr).height = hasBottomStamp ? Math.max(80, Number(OVERRIDES.companyStampSize) || 90, Number(OVERRIDES.personalStampSize) || 70) : 30;
  
  let usedCoords = {}; // ?пҝҪпҝҪ??пҝҪжӯў?пҝҪеә§жЁҷпҝҪ???
  function applyStamp(base64Data, size, posStr) {
    if (!base64Data) return;
    const cleanBase64 = base64Data.replace(/^data:image\/\w+;base64,/, "");
    const imgId = workbook.addImage({ base64: cleanBase64, extension: 'png' });
    
    let info = parseCellOrKeyword(posStr);
    let key = `${info.row}_${info.col}`;
    while (usedCoords[key]) {
       info.col += (size / 60) + 0.2; // еҫҖ?пҝҪпҝҪ???       key = `${info.row}_${info.col}`;
    }
    usedCoords[key] = true;

    ws.addImage(imgId, {
      tl: { col: info.col, row: info.row },
      ext: { width: size, height: size }
    });
  }

  applyStamp(OVERRIDES.companyStamp, Number(OVERRIDES.companyStampSize) || 90, OVERRIDES.companyStampPos || '?пҝҪпҝҪ?');
  applyStamp(OVERRIDES.personalStamp, Number(OVERRIDES.personalStampSize) || 70, OVERRIDES.personalStampPos || 'е·ҰпҝҪ?');
  // ==========================
}

// ?пҝҪ?пҝҪ иіҮпҝҪ????пјҡпҝҪ??пҝҪзЁ®еӯҗд»ЈжіЁе…Ҙе°Қж–№иҰӘд»Ј ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ?пҝҪ
function injectMatingInfoChildren() {
  const allParents = [...DATA.mothers, ...DATA.fathers];
  const parentMap = {};
  allParents.forEach(p => parentMap[p.chipId] = p);

  allParents.forEach(parent => {
    const customKids = OVERRIDES.customKittens[parent.chipId] || [];
    const mergedOther = [...parent.otherChildren, ...customKids];
    
    mergedOther.forEach(child => {
      const matingInfo = OVERRIDES.kittenMatingInfo[child.chipId];
      if (matingInfo && matingInfo.partnerChipId) {
        const partnerId = matingInfo.partnerChipId;
        if (parentMap[partnerId]) {
          const partner = parentMap[partnerId];
          const exists = partner.pdfLitters.some(l => l.kittens.some(k => k.chipId === child.chipId)) ||
                         partner.otherChildren.some(k => k.chipId === child.chipId);
          if (!exists) {
            const newChild = { ...child };
            if (parent.sex === 'пҝҪ?) {
              newChild.motherChipId = parent.chipId;
              newChild.fatherChipId = partnerId;
            } else if (parent.sex === '??) {
              newChild.fatherChipId = parent.chipId;
              newChild.motherChipId = partnerId;
            }
            partner.otherChildren.push(newChild);
          }
        }
      }
    });
  });
}

async function saveMatingModal() {
  const partnerChipId = document.getElementById('matingPartnerId').value.trim();
  const partnerType = document.getElementById('matingPartnerType').value;
  const matingDate = document.getElementById('matingDate').value;

  if (partnerChipId || matingDate) {
    currentMatingChipIds.forEach(chip => {
      OVERRIDES.kittenMatingInfo[chip] = { partnerChipId, partnerType, matingDate };
    });
  } else {
    currentMatingChipIds.forEach(chip => {
      delete OVERRIDES.kittenMatingInfo[chip];
    });
  }
  
  await saveOverrides();
  closeMatingModal();
  
  // ?пҝҪж–°?пҝҪпҝҪ?иіҮпҝҪ?д»Ҙи§ё?пҝҪпҝҪ??
  init(); 
}

function handleStampUpload(event, type) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    OVERRIDES[type] = e.target.result;
    updateStampPreview(type);
    await saveOverrides();
  };
  reader.readAsDataURL(file);
}
