# ==========================================
# 📂 存放路徑：FEEDING/.github/workflows/docker-build.yml
# 📖 檔案解說：這是一個 GitHub Actions 自動化腳本，專門用來將 FEEDING (餵食紀錄) 專案打包成 Docker Image 並推送到雲端倉庫。
# 🚀 觸發條件：當有人把程式碼推送到 master 或 main 分支時，就會自動執行。
# ==========================================

name: Build and Push FEEDING Image # 這個腳本的名稱，會顯示在 GitHub 的 Actions 頁面中

# 定義何時觸發這個自動化流程
on:
  push:
    branches:
      - master # 支援舊版專案預設的 master 分支
      - main   # 支援新版專案預設的 main 分支

# 設定一些全域變數
env:
  REGISTRY: ghcr.io # 指定要推送到的 Docker 雲端倉庫 (GitHub 內建的 Container Registry)
  IMAGE_NAME: ${{ github.repository }}-feeding # 設定打包出來的映像檔名稱，例如 steve-shih/feeding-feeding

# 定義要執行的工作任務
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest # 這個工作會在一台由 GitHub 提供的最新版 Ubuntu 虛擬機上執行
    permissions:
      contents: read # 允許讀取程式碼
      packages: write # 允許寫入/上傳 Docker Image 到 GHCR

    # 這是這個工作包含的所有步驟，會由上往下依序執行
    steps:
      # [步驟 1] 下載程式碼：啟動虛擬機並把您的最新程式碼抓下來
      - name: Checkout repository
        uses: actions/checkout@v4

      # [步驟 2] 登入 Docker 雲端倉庫：使用您的 GitHub 帳號密碼登入 GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }} # 您的 GitHub 帳號名稱
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自動提供的臨時密碼，不需要您手動設定

      # [步驟 3] 萃取標籤與中介資料：決定這個 Docker Image 要叫什麼名字、版本號是多少
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # [步驟 4] 開始打包並推送到雲端倉庫：這是最核心的步驟！
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # 告訴打包程式：請在「當下專案根目錄」尋找 Dockerfile
          push: true # 打包完成後，是否要自動上傳到雲端？ (true 代表是)
          tags: ${{ steps.meta.outputs.tags }} # 使用上一個步驟產生出來的標籤名字
          labels: ${{ steps.meta.outputs.labels }} # 使用上一個步驟產生出來的附註資訊
